# fly.toml app configuration file generated for ollama-fastapi-railway-deployment on 2026-05-14T06:28:31Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ollama-fastapi-railway-deployment'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  DEFAULT_MODEL = 'qwen2.5:0.5b'
  OLLAMA_HOST = 'http://localhost:11434'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '5m0s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 131072

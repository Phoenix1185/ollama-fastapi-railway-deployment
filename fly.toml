app = "ollama-fastapi-railway"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  DEFAULT_MODEL = "qwen2.5:0.5b"
  OLLAMA_HOST = "http://localhost:11434"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "300s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2
